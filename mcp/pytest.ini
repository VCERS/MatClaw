[pytest]
# Pytest configuration for MatClaw MCP tools

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 7.0

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for categorizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    pymatgen: marks tests requiring pymatgen
    ase: marks tests requiring ASE
    materials_project: marks tests requiring Materials Project API

# Coverage options (if pytest-cov is installed)
# addopts = --cov=tools --cov-report=html --cov-report=term
